name: CD

on:
  push:
    branches:
      - main
      - master
      - dev
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: Deployment environment.
        required: true
        type: choice
        options:
          - dev
          - prod
        default: dev

permissions:
  contents: read
  packages: read
  id-token: write

concurrency:
  group: cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CONTRACT_REPO: https://github.com/jho951/service-contract
  SERVICE_NAME: monitoring-service
  CD_PROFILE: ec2-compose
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  HEALTH_URL: ${{ vars.HEALTH_URL || '' }}
  READY_URL: ${{ vars.READY_URL || '' }}
  DEPLOY_COMMAND: ${{ secrets.DEPLOY_COMMAND }}
  HAS_EC2_DEPLOY_TARGET: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_SSH_KEY != '' }}
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST || '' }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER || 'ec2-user' }}
  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
  DEPLOY_BUNDLE_DIR: ${{ vars.DEPLOY_BUNDLE_DIR || '/opt/deploy' }}
  IMAGE_BUILD_COMMAND: |
    docker build -f docker/prometheus/Dockerfile -t "${PROMETHEUS_IMAGE_URI}:${GITHUB_SHA}" .
    docker push "${PROMETHEUS_IMAGE_URI}:${GITHUB_SHA}"
    docker build -f docker/grafana/Dockerfile -t "${GRAFANA_IMAGE_URI}:${GITHUB_SHA}" .
    docker push "${GRAFANA_IMAGE_URI}:${GITHUB_SHA}"
    docker build -f docker/loki/Dockerfile -t "${LOKI_IMAGE_URI}:${GITHUB_SHA}" .
    docker push "${LOKI_IMAGE_URI}:${GITHUB_SHA}"
    docker build -f docker/promtail/Dockerfile -t "${PROMTAIL_IMAGE_URI}:${GITHUB_SHA}" .
    docker push "${PROMTAIL_IMAGE_URI}:${GITHUB_SHA}"
    if [ "${PUBLISH_LATEST}" = "true" ]; then
      docker tag "${PROMETHEUS_IMAGE_URI}:${GITHUB_SHA}" "${PROMETHEUS_IMAGE_URI}:latest"
      docker push "${PROMETHEUS_IMAGE_URI}:latest"
      docker tag "${GRAFANA_IMAGE_URI}:${GITHUB_SHA}" "${GRAFANA_IMAGE_URI}:latest"
      docker push "${GRAFANA_IMAGE_URI}:latest"
      docker tag "${LOKI_IMAGE_URI}:${GITHUB_SHA}" "${LOKI_IMAGE_URI}:latest"
      docker push "${LOKI_IMAGE_URI}:latest"
      docker tag "${PROMTAIL_IMAGE_URI}:${GITHUB_SHA}" "${PROMTAIL_IMAGE_URI}:latest"
      docker push "${PROMTAIL_IMAGE_URI}:latest"
    fi
  COMPOSE_CONFIG_COMMAND: |
    docker compose -f docker/dev/compose.yml config >/tmp/monitoring-dev.yml
    PROMETHEUS_IMAGE=123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/prod-monitoring-service-prometheus:test GRAFANA_IMAGE=123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/prod-monitoring-service-grafana:test LOKI_IMAGE=123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/prod-monitoring-service-loki:test PROMTAIL_IMAGE=123456789012.dkr.ecr.ap-northeast-2.amazonaws.com/prod-monitoring-service-promtail:test docker compose -f docker/prod/compose.yml config >/tmp/monitoring-prod.yml

jobs:
  deploy-gate:
    name: Deploy Gate
    runs-on: ubuntu-latest
    outputs:
      deploy_environment: ${{ steps.target.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate contract lock
        shell: bash
        run: |
          set -euo pipefail
          test -f contract.lock.yml
          grep -q "repo: ${CONTRACT_REPO}" contract.lock.yml
          grep -q "name: ${SERVICE_NAME}" contract.lock.yml
          grep -q "cd:" contract.lock.yml
          grep -q "profile: ${CD_PROFILE}" contract.lock.yml

      - name: Resolve target environment
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ inputs.deploy_environment }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            target="prod"
          elif [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.ref_name }}" = "master" ]; then
            target="prod"
          else
            target="dev"
          fi
          if [ "$target" = "prod" ] && [ "${{ github.ref_name }}" != "main" ] && [ "${{ github.ref_type }}" != "tag" ]; then
            echo "Production deploy requires main branch or a tag."
            exit 1
          fi
          echo "environment=$target" >> "$GITHUB_OUTPUT"

  image:
    name: Image
    runs-on: ubuntu-latest
    needs: deploy-gate
    outputs:
      prometheus_image_uri: ${{ steps.resolve.outputs.prometheus_image_uri }}
      grafana_image_uri: ${{ steps.resolve.outputs.grafana_image_uri }}
      loki_image_uri: ${{ steps.resolve.outputs.loki_image_uri }}
      promtail_image_uri: ${{ steps.resolve.outputs.promtail_image_uri }}
      registry: ${{ steps.resolve.outputs.registry }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve image targets
        id: resolve
        shell: bash
        env:
          DEPLOY_ENVIRONMENT: ${{ needs.deploy-gate.outputs.deploy_environment }}
        run: |
          set -euo pipefail
          registry="${{ steps.login-ecr.outputs.registry }}"
          prefix="${DEPLOY_ENVIRONMENT}-${SERVICE_NAME}"
          echo "registry=${registry}" >> "$GITHUB_OUTPUT"
          echo "prometheus_image_uri=${registry}/${prefix}-prometheus" >> "$GITHUB_OUTPUT"
          echo "grafana_image_uri=${registry}/${prefix}-grafana" >> "$GITHUB_OUTPUT"
          echo "loki_image_uri=${registry}/${prefix}-loki" >> "$GITHUB_OUTPUT"
          echo "promtail_image_uri=${registry}/${prefix}-promtail" >> "$GITHUB_OUTPUT"

      - name: Ensure ECR repositories
        shell: bash
        env:
          DEPLOY_ENVIRONMENT: ${{ needs.deploy-gate.outputs.deploy_environment }}
        run: |
          set -euo pipefail
          for suffix in prometheus grafana loki promtail; do
            repo="${DEPLOY_ENVIRONMENT}-${SERVICE_NAME}-${suffix}"
            aws ecr describe-repositories --region "${AWS_REGION}" --repository-names "${repo}" >/dev/null 2>&1 || \
              aws ecr create-repository --region "${AWS_REGION}" --repository-name "${repo}" >/dev/null
          done

      - name: Build and push image
        shell: bash
        env:
          PROMETHEUS_IMAGE_URI: ${{ steps.resolve.outputs.prometheus_image_uri }}
          GRAFANA_IMAGE_URI: ${{ steps.resolve.outputs.grafana_image_uri }}
          LOKI_IMAGE_URI: ${{ steps.resolve.outputs.loki_image_uri }}
          PROMTAIL_IMAGE_URI: ${{ steps.resolve.outputs.promtail_image_uri }}
          PUBLISH_LATEST: ${{ github.ref_name == 'main' || github.ref_name == 'master' }}
        run: |
          set -euo pipefail
          ${{ env.IMAGE_BUILD_COMMAND }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - deploy-gate
      - image
    environment: ${{ needs.deploy-gate.outputs.deploy_environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate compose config
        shell: bash
        run: ${{ env.COMPOSE_CONFIG_COMMAND }}

      - name: Setup SSH agent
        if: ${{ env.HAS_EC2_DEPLOY_TARGET == 'true' }}
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add deploy host to known_hosts
        if: ${{ env.HAS_EC2_DEPLOY_TARGET == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy to EC2
        if: ${{ env.HAS_EC2_DEPLOY_TARGET == 'true' }}
        shell: bash
        env:
          PROMETHEUS_IMAGE: ${{ needs.image.outputs.prometheus_image_uri }}:${{ github.sha }}
          GRAFANA_IMAGE: ${{ needs.image.outputs.grafana_image_uri }}:${{ github.sha }}
          LOKI_IMAGE: ${{ needs.image.outputs.loki_image_uri }}:${{ github.sha }}
          PROMTAIL_IMAGE: ${{ needs.image.outputs.promtail_image_uri }}:${{ github.sha }}
          REGISTRY: ${{ needs.image.outputs.registry }}
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "AWS_REGION='${AWS_REGION}' REGISTRY='${REGISTRY}' PROMETHEUS_IMAGE='${PROMETHEUS_IMAGE}' GRAFANA_IMAGE='${GRAFANA_IMAGE}' LOKI_IMAGE='${LOKI_IMAGE}' PROMTAIL_IMAGE='${PROMTAIL_IMAGE}' DEPLOY_BUNDLE_DIR='${DEPLOY_BUNDLE_DIR}' bash -se" <<'EOF'
          set -euo pipefail
          aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${REGISTRY}"
          cd "${DEPLOY_BUNDLE_DIR}"
          test -f .env.backend
          sed -i "s|^PROMETHEUS_IMAGE=.*$|PROMETHEUS_IMAGE=${PROMETHEUS_IMAGE}|" .env.backend
          sed -i "s|^GRAFANA_IMAGE=.*$|GRAFANA_IMAGE=${GRAFANA_IMAGE}|" .env.backend
          sed -i "s|^LOKI_IMAGE=.*$|LOKI_IMAGE=${LOKI_IMAGE}|" .env.backend
          sed -i "s|^PROMTAIL_IMAGE=.*$|PROMTAIL_IMAGE=${PROMTAIL_IMAGE}|" .env.backend
          ./scripts/deploy-stack.sh up
          EOF

      - name: Fallback deploy command
        if: ${{ env.HAS_EC2_DEPLOY_TARGET != 'true' && env.DEPLOY_COMMAND != '' }}
        shell: bash
        env:
          PROMETHEUS_IMAGE: ${{ needs.image.outputs.prometheus_image_uri }}:${{ github.sha }}
          GRAFANA_IMAGE: ${{ needs.image.outputs.grafana_image_uri }}:${{ github.sha }}
          LOKI_IMAGE: ${{ needs.image.outputs.loki_image_uri }}:${{ github.sha }}
          PROMTAIL_IMAGE: ${{ needs.image.outputs.promtail_image_uri }}:${{ github.sha }}
        run: |
          set -euo pipefail
          eval "${DEPLOY_COMMAND}"

      - name: Skip deploy
        if: ${{ env.HAS_EC2_DEPLOY_TARGET != 'true' && env.DEPLOY_COMMAND == '' }}
        shell: bash
        run: echo "No EC2 deploy target or DEPLOY_COMMAND configured; image publish and compose validation completed."

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health check
        shell: bash
        run: |
          set -euo pipefail
          if [ "${HAS_EC2_DEPLOY_TARGET}" != "true" ] && [ -z "${DEPLOY_COMMAND}" ]; then
            echo "Skipping remote health check."
            exit 0
          fi
          if [ -z "${HEALTH_URL}" ]; then
            echo "Skipping remote health check."
            exit 0
          fi
          curl --fail --retry 12 --retry-delay 5 "${HEALTH_URL}"

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: health-check
    steps:
      - name: Smoke test
        shell: bash
        run: |
          set -euo pipefail
          if [ "${HAS_EC2_DEPLOY_TARGET}" != "true" ] && [ -z "${DEPLOY_COMMAND}" ]; then
            echo "Skipping remote smoke test."
            exit 0
          fi
          if [ -z "${READY_URL}" ]; then
            echo "Skipping remote smoke test."
            exit 0
          fi
          curl --fail --retry 12 --retry-delay 5 "${READY_URL}"
