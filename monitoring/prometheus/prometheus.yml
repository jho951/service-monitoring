global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: ec2-services
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/ec2-services.yml
        refresh_interval: 30s
