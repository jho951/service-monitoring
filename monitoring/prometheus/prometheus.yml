global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: auth-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - auth-service:8081
        labels:
          service: auth-service

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - user-service:8082
        labels:
          service: user-service

  - job_name: authz-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - permission-service:8084
        labels:
          service: authz-service

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - gateway:8080
        labels:
          service: api-gateway

  - job_name: redis-server
    metrics_path: /metrics
    static_configs:
      - targets:
          - central-redis-exporter:9121
        labels:
          service: redis-server

  # Enable after documents-service exposes /actuator/prometheus.
